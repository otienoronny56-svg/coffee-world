<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Coffee World</title>
    <link rel="icon" type="image/png" href="../assets/images/coffee-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="login-wrapper animate-fade">
        <div class="login-card animate-slide">
            <div class="login-header">
                <div class="login-brand">
                    <img src="../assets/images/coffee-logo.png" alt="Logo" class="login-logo">
                    <div class="brand-text">
                        <h2>CWI Admin</h2>
                        <span>Intelligence Portal</span>
                    </div>
                </div>
                <p class="login-subtitle">Secure access to Financial Headquarters</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" required placeholder="admin@coffeeworld.com" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
                
                <div class="login-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" id="login-btn" class="btn primary-btn login-submit-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 Coffee World Investment Ltd.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    <script type="module" src="../js/supabase-client.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
